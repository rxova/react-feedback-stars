name: Setup Playwright
description: Resolve, cache and install Playwright browsers.

inputs:
  browsers:
    description: >
      Space-separated browser list. Leave empty for the full set the e2e suite
      needs, which is defined once in package.json's `e2e:install` script so
      contributors and CI install the same thing. Jobs that only drive Vitest
      browser mode should pass "chromium".
    required: false
    default: ''

runs:
  using: composite
  steps:
    # The binaries only change when Playwright does, so the cache is keyed on
    # the resolved version rather than the lockfile hash.
    - name: Resolve Playwright version
      id: pw
      shell: bash
      run: |
        echo "version=$(node -p "require('./node_modules/playwright/package.json').version")" >> "$GITHUB_OUTPUT"
        echo "slug=$(echo '${{ inputs.browsers }}' | tr ' ' '-' | sed 's/^$/all/')" >> "$GITHUB_OUTPUT"

    - name: Export browser path
      shell: bash
      run: echo "PLAYWRIGHT_BROWSERS_PATH=${{ github.workspace }}/.pw-browsers" >> "$GITHUB_ENV"

    - uses: actions/cache@v6
      id: pw-cache
      with:
        path: ${{ github.workspace }}/.pw-browsers
        # The browser set is part of the key: without it a chromium-only cache
        # would satisfy a job that needs all three, and the run would fail at
        # launch with "Executable doesn't exist".
        key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}-${{ steps.pw.outputs.slug }}

    - name: Install the full browser set
      if: steps.pw-cache.outputs.cache-hit != 'true' && inputs.browsers == ''
      shell: bash
      run: pnpm run e2e:install

    - name: Install selected browsers
      if: steps.pw-cache.outputs.cache-hit != 'true' && inputs.browsers != ''
      shell: bash
      run: pnpm exec playwright install --with-deps ${{ inputs.browsers }}

    # System libraries live outside the cached directory, so they are installed
    # on every run even when the binaries were restored.
    - name: Install system dependencies
      if: steps.pw-cache.outputs.cache-hit == 'true'
      shell: bash
      # No argument means "every installed browser", which is exactly right
      # when the input was left empty.
      run: pnpm exec playwright install-deps ${{ inputs.browsers }}
