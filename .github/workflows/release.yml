name: Release

# Runs only after CI has gone green on main. CI already runs the full ordered
# gate (lint, types, tests, coverage, e2e, package contract) on the exact
# commit being released, so re-running `pnpm run verify` here would just
# duplicate that whole suite — browsers and all. Gating on CI's success gives
# the same guarantee ("a push to main cannot publish something a PR would have
# been blocked on") without running the checks a second time.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency: release-${{ github.ref }}

permissions:
  contents: read

jobs:
  release:
    # workflow_run fires on both success and failure; only release when CI
    # passed. Manual dispatch has no upstream run to gate on.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # version commit and tags
      pull-requests: write # the version PR
      # npm trusted publishing (OIDC): lets us publish with provenance and no
      # long-lived NPM_TOKEN in the repository.
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Check out main by name (not the workflow_run's detached SHA) so the
          # changesets action knows its base branch when opening the version PR.
          ref: main
          fetch-depth: 0
      - uses: ./.github/actions/setup-pnpm
        with:
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1
      - run: pnpm install --frozen-lockfile

      - name: Create version PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm exec changeset version
          publish: pnpm run release
          commit: 'chore: version package'
          title: 'chore: version package'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
