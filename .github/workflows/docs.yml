name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      # The docs import the real component for live examples, so the library
      # must be built first. (TypeDoc still reads the source directly for the
      # API reference, which regenerates during the docs build.)
      - run: pnpm --filter react-feedback-stars build
      - run: pnpm --filter @react-feedback-stars/docs build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
