name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default to read-only; jobs opt into more where they need it.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers

jobs:
  static:
    name: lint · types · format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run typecheck

  unit:
    name: unit (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ matrix.node }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:unit

  browser:
    name: browser + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile

      # The browser binary is the slow part and only changes when Playwright
      # does, so the cache key is the resolved version.
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('./node_modules/playwright/package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v6
        id: pw-cache
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Install system dependencies only
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      # Enforces 95% per file. A new file with thin tests fails here even when
      # the repository average would still pass.
      - run: pnpm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: ignore

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('./node_modules/playwright/package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v6
        id: pw-cache
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Install system dependencies only
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - run: pnpm run e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  package:
    name: package contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run audit:check
      - run: pnpm run dedupe:check
      - run: pnpm run build
      # publint and attw read the manifest; pack:smoke installs the real
      # tarball and imports it through both module systems.
      - run: pnpm run check:exports
      - run: pnpm run pack:smoke
      - run: pnpm run size

  changeset:
    name: changeset present
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - name: Require a changeset for user-facing changes
        # Docs- and CI-only pull requests carry the `skip-changeset` label.
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changeset') }}
        run: pnpm exec changeset status --since=origin/${{ github.event.pull_request.base.ref }}
