name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default to read-only; jobs opt into more where they need it.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: lint · types · format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run typecheck

  unit:
    name: unit (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The floor here must match `engines.node` in package.json. Claiming a
        # version we never run is worse than not claiming it.
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v7

      # Install always runs on a pnpm-compatible Node: pnpm 11 declares
      # `engines.node >= 22.13` and imports `node:sqlite`, so installing under
      # Node 20 crashes with ERR_UNKNOWN_BUILTIN_MODULE before a single test
      # executes. That is a constraint of our package manager, not of the
      # library, and it must not silently shrink the support matrix.
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile

      # Then switch to the Node under test and invoke Vitest's binary directly,
      # bypassing pnpm entirely. Vitest itself supports ^20 || ^22 || >=24.
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
      - name: Confirm the Node under test
        run: node --version
      # vitest is a devDependency of the library package, so its binary lives in
      # that package's node_modules, not the workspace root.
      - run: ./node_modules/.bin/vitest run --project unit
        working-directory: packages/react-feedback-stars

  browser:
    name: browser + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile

      # The browser binary is the slow part and only changes when Playwright
      # does, so the cache key is the resolved version.
      - uses: ./.github/actions/setup-playwright
        with:
          browsers: chromium

      # Enforces 95% per file. A new file with thin tests fails here even when
      # the repository average would still pass.
      - run: pnpm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: ignore

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - uses: ./.github/actions/setup-playwright

      - run: pnpm run e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  # The peer range allows React 18, but the lockfile only ever installs 19, so
  # without this the minimum supported version is an untested claim. Separate
  # from the matrix because it has to rewrite the React version, which
  # --frozen-lockfile forbids.
  react-minimum:
    name: react 18
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - uses: ./.github/actions/setup-playwright
        with:
          browsers: chromium
      - name: Install the minimum supported React and re-run
        run: pnpm run test:react-min

  package:
    name: package contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run audit:check
      - run: pnpm run dedupe:check
      - run: pnpm run build
      # publint and attw read the manifest; pack:smoke installs the real
      # tarball and imports it through both module systems.
      - run: pnpm run check:exports
      - run: pnpm run pack:smoke
      - run: pnpm run size

  changeset:
    name: changeset present
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - name: Require a changeset for user-facing changes
        # Docs- and CI-only pull requests carry the `skip-changeset` label.
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changeset') }}
        run: pnpm exec changeset status --since=origin/${{ github.event.pull_request.base.ref }}
