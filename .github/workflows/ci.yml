name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Playwright's browser cache lives here so the download is shared across jobs.
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers

jobs:
  static:
    name: lint + types + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm format:check

  unit:
    name: unit (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit

  browser:
    name: browser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # The browser binary is the slow part, and it only changes when
      # Playwright does — so key the cache on the resolved version.
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(pnpm ls playwright --json | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>console.log(JSON.parse(s)[0].devDependencies.playwright.version))')" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
      - name: Install system deps only
        run: pnpm exec playwright install-deps chromium
        if: steps.pw-cache.outputs.cache-hit == 'true'

      - run: pnpm test:browser
      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-failures
          path: src/**/__screenshots__/
          if-no-files-found: ignore

  package:
    name: build + package contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # publint checks the manifest; attw checks that types resolve in every
      # module mode; size-limit holds the budget.
      - run: pnpm check:exports
      - run: pnpm size
